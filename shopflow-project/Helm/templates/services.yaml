{{- range $name, $svc := dict "auth" .Values.authService "product" .Values.productService "order" .Values.orderService "payment" .Values.paymentService "notification" .Values.notificationService "api-gateway" .Values.apiGateway "frontend" .Values.frontend "admin-dashboard" .Values.adminDashboard }}
{{- $component := "" }}
{{- $serviceName := "" }}
{{- $deploymentName := "" }}
{{- $containerName := "" }}
{{- $port := 0 }}
{{- if eq $name "auth" }}{{ $component = "auth-service" }}{{ $serviceName = "auth-service" }}{{ $deploymentName = "shopflow-auth-service" }}{{ $containerName = "auth-service" }}{{ $port = 8001 }}{{ else if eq $name "product" }}{{ $component = "product-service" }}{{ $serviceName = "product-service" }}{{ $deploymentName = "shopflow-product-service" }}{{ $containerName = "product-service" }}{{ $port = 8002 }}{{ else if eq $name "order" }}{{ $component = "order-service" }}{{ $serviceName = "order-service" }}{{ $deploymentName = "shopflow-order-service" }}{{ $containerName = "order-service" }}{{ $port = 8003 }}{{ else if eq $name "payment" }}{{ $component = "payment-service" }}{{ $serviceName = "payment-service" }}{{ $deploymentName = "shopflow-payment-service" }}{{ $containerName = "payment-service" }}{{ $port = 8004 }}{{ else if eq $name "notification" }}{{ $component = "notification-service" }}{{ $serviceName = "notification-service" }}{{ $deploymentName = "shopflow-notification-service" }}{{ $containerName = "notification-service" }}{{ $port = 8005 }}{{ else if eq $name "api-gateway" }}{{ $component = "api-gateway" }}{{ $serviceName = "api-gateway" }}{{ $deploymentName = "shopflow-api-gateway" }}{{ $containerName = "api-gateway" }}{{ $port = 8000 }}{{ else if eq $name "frontend" }}{{ $component = "frontend" }}{{ $serviceName = "frontend" }}{{ $deploymentName = "shopflow-frontend" }}{{ $containerName = "frontend" }}{{ $port = 80 }}{{ else if eq $name "admin-dashboard" }}{{ $component = "admin-dashboard" }}{{ $serviceName = "admin-dashboard" }}{{ $deploymentName = "shopflow-admin-dashboard" }}{{ $containerName = "admin-dashboard" }}{{ $port = 80 }}{{ end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $deploymentName }}
  namespace: {{ include "shopflow.namespace" $ }}
  labels:
    app: {{ $.Values.appLabels.app }}
    component: {{ $component }}
spec:
  replicas: {{ $svc.replicaCount }}
  selector:
    matchLabels:
      app: {{ $.Values.appLabels.app }}
      component: {{ $component }}
  template:
    metadata:
      labels:
        app: {{ $.Values.appLabels.app }}
        component: {{ $component }}
    spec:
      containers:
        - name: {{ $containerName }}
          image: {{ $svc.image.repository }}:{{ $svc.image.tag }}
          imagePullPolicy: {{ $svc.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.containerPort }}
          env:
            {{- if eq $name "auth" }}
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "shopflow.configMapName" $ }}
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "shopflow.configMapName" $ }}
                  key: DB_PORT
            - name: DB_NAME
              value: {{ $.Values.config.authDbName }}
            - name: PORT
              value: {{ $.Values.config.authServicePort | quote }}
            - name: JWT_EXPIRY_HOURS
              value: {{ $.Values.config.jwtExpiryHours | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "shopflow.secretName" $ }}
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "shopflow.secretName" $ }}
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "shopflow.secretName" $ }}
                  key: JWT_SECRET
            {{- else if eq $name "product" }}
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "shopflow.configMapName" $ }}
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "shopflow.configMapName" $ }}
                  key: DB_PORT
            - name: DB_NAME
              value: {{ $.Values.config.productDbName }}
            - name: PORT
              value: {{ $.Values.config.productServicePort | quote }}
            - name: AUTH_SERVICE_URL
              value: {{ $.Values.config.authServiceUrl | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "shopflow.secretName" $ }}
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "shopflow.secretName" $ }}
                  key: DB_PASSWORD
            {{- else if eq $name "order" }}
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "shopflow.configMapName" $ }}
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "shopflow.configMapName" $ }}
                  key: DB_PORT
            - name: DB_NAME
              value: {{ $.Values.config.orderDbName }}
            - name: PORT
              value: {{ $.Values.config.orderServicePort | quote }}
            - name: AUTH_SERVICE_URL
              value: {{ $.Values.config.authServiceUrl | quote }}
            - name: PRODUCT_SERVICE_URL
              value: {{ $.Values.config.productServiceUrl | quote }}
            - name: NOTIFICATION_SERVICE_URL
              value: {{ $.Values.config.notificationServiceUrl | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "shopflow.secretName" $ }}
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "shopflow.secretName" $ }}
                  key: DB_PASSWORD
            {{- else if eq $name "payment" }}
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "shopflow.configMapName" $ }}
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "shopflow.configMapName" $ }}
                  key: DB_PORT
            - name: DB_NAME
              value: {{ $.Values.config.paymentDbName }}
            - name: PORT
              value: {{ $.Values.config.paymentServicePort | quote }}
            - name: AUTH_SERVICE_URL
              value: {{ $.Values.config.authServiceUrl | quote }}
            - name: ORDER_SERVICE_URL
              value: {{ $.Values.config.orderServiceUrl | quote }}
            - name: PAYMENT_SUCCESS_RATE
              value: {{ $.Values.config.paymentSuccessRate | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "shopflow.secretName" $ }}
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "shopflow.secretName" $ }}
                  key: DB_PASSWORD
            {{- else if eq $name "notification" }}
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "shopflow.configMapName" $ }}
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "shopflow.configMapName" $ }}
                  key: DB_PORT
            - name: DB_NAME
              value: {{ $.Values.config.notificationDbName }}
            - name: PORT
              value: {{ $.Values.config.notificationServicePort | quote }}
            - name: AUTH_SERVICE_URL
              value: {{ $.Values.config.authServiceUrl | quote }}
            - name: EMAIL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: {{ include "shopflow.configMapName" $ }}
                  key: EMAIL_ENABLED
            - name: EMAIL_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "shopflow.configMapName" $ }}
                  key: EMAIL_HOST
            - name: EMAIL_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "shopflow.configMapName" $ }}
                  key: EMAIL_PORT
            - name: EMAIL_FROM
              valueFrom:
                configMapKeyRef:
                  name: {{ include "shopflow.configMapName" $ }}
                  key: EMAIL_FROM
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "shopflow.secretName" $ }}
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "shopflow.secretName" $ }}
                  key: DB_PASSWORD
            - name: EMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "shopflow.secretName" $ }}
                  key: EMAIL_USER
            - name: EMAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "shopflow.secretName" $ }}
                  key: EMAIL_PASS
            {{- else if eq $name "api-gateway" }}
            - name: PORT
              value: {{ $.Values.config.apiGatewayPort | quote }}
            - name: AUTH_SERVICE_URL
              value: {{ $.Values.config.authServiceUrl | quote }}
            - name: PRODUCT_SERVICE_URL
              value: {{ $.Values.config.productServiceUrl | quote }}
            - name: ORDER_SERVICE_URL
              value: {{ $.Values.config.orderServiceUrl | quote }}
            - name: PAYMENT_SERVICE_URL
              value: {{ $.Values.config.paymentServiceUrl | quote }}
            - name: NOTIFICATION_SERVICE_URL
              value: {{ $.Values.config.notificationServiceUrl | quote }}
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "shopflow.configMapName" $ }}
                  key: ALLOWED_ORIGINS
            {{- else if eq $name "frontend" }}
            - name: REACT_APP_API_URL
              value: ""
            {{- end }}
          resources:
            requests:
              cpu: {{ $svc.resources.requests.cpu | quote }}
              memory: {{ $svc.resources.requests.memory | quote }}
            limits:
              cpu: {{ $svc.resources.limits.cpu | quote }}
              memory: {{ $svc.resources.limits.memory | quote }}
          readinessProbe:
            tcpSocket:
              port: {{ $svc.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ $svc.containerPort }}
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $serviceName }}
  namespace: {{ include "shopflow.namespace" $ }}
  labels:
    app: {{ $.Values.appLabels.app }}
    component: {{ $component }}
spec:
  selector:
    app: {{ $.Values.appLabels.app }}
    component: {{ $component }}
  ports:
    - port: {{ $port }}
      targetPort: {{ $svc.containerPort }}
  type: ClusterIP
{{- end }}
