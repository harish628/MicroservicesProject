apiVersion: apps/v1
kind: Deployment

metadata:
  name: shopflow-frontend
  namespace: shopflow
  labels:
    app: shopflow
    component: frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: shopflow
      component: frontend

  template:
    metadata:
      labels:
        app: shopflow
        component: frontend

    spec:
      containers:
        - name: frontend
          image: harishgundimeda/shopflow-project-frontend:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 80

          env:
            - name: REACT_APP_API_URL
              value: ""

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
