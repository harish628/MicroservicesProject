apiVersion: apps/v1
kind: Deployment

metadata:
  name: shopflow-admin-dashboard
  namespace: shopflow
  labels:
    app: shopflow
    component: admin-dashboard

spec:
  replicas: 2

  selector:
    matchLabels:
      app: shopflow
      component: admin-dashboard

  template:
    metadata:
      labels:
        app: shopflow
        component: admin-dashboard

    spec:
      containers:
        - name: admin-dashboard
          image: harishgundimeda/shopflow-project-admin-dashboard:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 80

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
