apiVersion: apps/v1
kind: Deployment

metadata:
  name: shopflow-product-service
  namespace: shopflow
  labels:
    app: shopflow
    component: product-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: shopflow
      component: product-service

  template:
    metadata:
      labels:
        app: shopflow
        component: product-service

    spec:
      containers:
        - name: product-service
          image: harishgundimeda/shopflow-project-product-service:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8002

          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: DB_HOST

            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: DB_PORT

            - name: DB_NAME
              value: product_db

            - name: PORT
              value: "8002"

            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8001"

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: shopflow-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopflow-secret
                  key: DB_PASSWORD

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            tcpSocket:
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 20
