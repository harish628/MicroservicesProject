apiVersion: apps/v1
kind: Deployment

metadata:
  name: shopflow-auth-service
  namespace: shopflow
  labels:
    app: shopflow
    component: auth-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: shopflow
      component: auth-service

  template:
    metadata:
      labels:
        app: shopflow
        component: auth-service

    spec:
      containers:
        - name: auth-service
          image: harishgundimeda/shopflow-project-auth-service:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8001

          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: DB_HOST

            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: DB_PORT

            - name: DB_NAME
              value: auth_db

            - name: PORT
              value: "8001"

            - name: JWT_EXPIRY_HOURS
              value: "24"

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: shopflow-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopflow-secret
                  key: DB_PASSWORD

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shopflow-secret
                  key: JWT_SECRET

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 20
