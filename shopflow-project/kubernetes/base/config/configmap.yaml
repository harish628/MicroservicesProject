apiVersion: v1
kind: ConfigMap
metadata:
  name: shopflow-config
  namespace: shopflow
data:
  # Database
  DB_HOST: mysql
  DB_PORT: "3306"

  # Service Ports
  AUTH_SERVICE_PORT: "8001"
  PRODUCT_SERVICE_PORT: "8002"
  ORDER_SERVICE_PORT: "8003"
  PAYMENT_SERVICE_PORT: "8004"
  NOTIFICATION_SERVICE_PORT: "8005"
  API_GATEWAY_PORT: "8000"

  # Database Names
  AUTH_DB_NAME: auth_db
  PRODUCT_DB_NAME: product_db
  ORDER_DB_NAME: order_db
  PAYMENT_DB_NAME: payment_db
  NOTIFICATION_DB_NAME: notification_db

  # Internal Service URLs
  AUTH_SERVICE_URL: http://auth-service:8001
  PRODUCT_SERVICE_URL: http://product-service:8002
  ORDER_SERVICE_URL: http://order-service:8003
  PAYMENT_SERVICE_URL: http://payment-service:8004
  NOTIFICATION_SERVICE_URL: http://notification-service:8005

  # JWT
  JWT_EXPIRY_HOURS: "24"

  # Payment
  PAYMENT_SUCCESS_RATE: "0.95"

  # Notification
  EMAIL_ENABLED: "false"
  EMAIL_HOST: smtp.gmail.com
  EMAIL_PORT: "587"
  EMAIL_FROM: "ShopFlow <noreply@shopflow.com>"

  # API Gateway
  #ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:4200,http://3.110.201.67:3000,http://3.110.201.67:4200"
  ALLOWED_ORIGINS: http://a15ef2bc4921744f6833e40225f8824c-39598065e4c47b77.elb.ap-south-1.amazonaws.com
