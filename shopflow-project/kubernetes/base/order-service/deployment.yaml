apiVersion: apps/v1
kind: Deployment

metadata:
  name: shopflow-order-service
  namespace: shopflow
  labels:
    app: shopflow
    component: order-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: shopflow
      component: order-service

  template:
    metadata:
      labels:
        app: shopflow
        component: order-service

    spec:
      containers:
        - name: order-service
          image: harishgundimeda/shopflow-project-order-service:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8003

          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: DB_HOST

            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: DB_PORT

            - name: DB_NAME
              value: order_db

            - name: PORT
              value: "8003"

            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8001"

            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:8002"

            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:8005"

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: shopflow-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopflow-secret
                  key: DB_PASSWORD

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            tcpSocket:
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 20
