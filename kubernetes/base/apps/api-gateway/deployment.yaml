apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: shopflow
  labels:
    app: api-gateway

spec:
  replicas: 2

  selector:
    matchLabels:
      app: api-gateway

  template:
    metadata:
      labels:
        app: api-gateway

    spec:
      containers:
      - name: api-gateway
        image: harishgundimeda/shopflow-project-api-gateway:latest
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8000

        envFrom:
        - configMapRef:
            name: shopflow-config

        - secretRef:
            name: shopflow-secret

        env:
        - name: PORT
          value: "8000"

        - name: AUTH_SERVICE_URL
          value: "http://auth-service:8001"

        - name: PRODUCT_SERVICE_URL
          value: "http://product-service:8002"

        - name: ORDER_SERVICE_URL
          value: "http://order-service:8003"

        - name: PAYMENT_SERVICE_URL
          value: "http://payment-service:8004"

        - name: NOTIFICATION_SERVICE_URL
          value: "http://notification-service:8005"

        - name: ALLOWED_ORIGINS
          value: "http://localhost:3000,http://localhost:4200"

        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10

        livenessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 20