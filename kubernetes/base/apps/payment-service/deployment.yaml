apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: shopflow
  labels:
    app: payment-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: payment-service

  template:
    metadata:
      labels:
        app: payment-service

    spec:
      containers:
      - name: payment-service
        image: harishgundimeda/shopflow-project-payment-service:latest
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8004

        envFrom:
        - configMapRef:
            name: shopflow-config
        - secretRef:
            name: shopflow-secret

        env:
        - name: DB_HOST
          value: mysql
        - name: DB_PORT
          value: "3306"
        - name: DB_USER
          value: root
        - name: DB_NAME
          value: payment_db
        - name: PORT
          value: "8004"
        - name: AUTH_SERVICE_URL
          value: "http://auth-service:8001"
        - name: ORDER_SERVICE_URL
          value: "http://order-service:8003"
        - name: PAYMENT_SUCCESS_RATE
          value: "0.95"

        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:
          tcpSocket:
            port: 8004
          initialDelaySeconds: 15
          periodSeconds: 10

        livenessProbe:
          tcpSocket:
            port: 8004
          initialDelaySeconds: 30
          periodSeconds: 20