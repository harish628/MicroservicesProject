apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: shopflow
  labels:
    app: notification-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: notification-service

  template:
    metadata:
      labels:
        app: notification-service

    spec:
      containers:
      - name: notification-service
        image: harishgundimeda/shopflow-project-notification-service:latest
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8005

        envFrom:
        - configMapRef:
            name: shopflow-config
        - secretRef:
            name: shopflow-secret

        env:
        - name: DB_HOST
          value: mysql
        - name: DB_PORT
          value: "3306"
        - name: DB_USER
          value: root
        - name: DB_NAME
          value: notification_db
        - name: PORT
          value: "8005"
        - name: AUTH_SERVICE_URL
          value: "http://auth-service:8001"

        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:
          tcpSocket:
            port: 8005
          initialDelaySeconds: 15
          periodSeconds: 10

        livenessProbe:
          tcpSocket:
            port: 8005
          initialDelaySeconds: 30
          periodSeconds: 20