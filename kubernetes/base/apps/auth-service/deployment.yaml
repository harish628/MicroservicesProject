apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: shopflow
  labels:
    app: auth-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service

    spec:
      containers:
        - name: auth-service
          image: harishgundimeda/shopflow-project-auth-service:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8001

          env:
            - name: DB_HOST
              value: mysql

            - name: DB_PORT
              value: "3306"

            - name: DB_USER
              value: root

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopflow-secret
                  key: MYSQL_ROOT_PASSWORD

            - name: DB_NAME
              value: auth_db

            - name: PORT
              value: "8001"

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shopflow-secret
                  key: JWT_SECRET

            - name: JWT_EXPIRY_HOURS
              value: "24"

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 20