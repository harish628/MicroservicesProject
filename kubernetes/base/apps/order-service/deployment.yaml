apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: shopflow
  labels:
    app: order-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: order-service

  template:
    metadata:
      labels:
        app: order-service

    spec:
      containers:
      - name: order-service
        image: harishgundimeda/shopflow-project-order-service:latest
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8003

        envFrom:
        - configMapRef:
            name: shopflow-config
        - secretRef:
            name: shopflow-secret

        env:
        - name: DB_HOST
          value: mysql
        - name: DB_PORT
          value: "3306"
        - name: DB_USER
          value: root
        - name: DB_NAME
          value: order_db
        - name: PORT
          value: "8003"
        - name: AUTH_SERVICE_URL
          value: "http://auth-service:8001"
        - name: PRODUCT_SERVICE_URL
          value: "http://product-service:8002"
        - name: NOTIFICATION_SERVICE_URL
          value: "http://notification-service:8005"

        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:
          tcpSocket:
            port: 8003
          initialDelaySeconds: 15
          periodSeconds: 10

        livenessProbe:
          tcpSocket:
            port: 8003
          initialDelaySeconds: 30
          periodSeconds: 20