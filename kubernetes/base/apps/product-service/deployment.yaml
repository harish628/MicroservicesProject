apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: shopflow
  labels:
    app: product-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: product-service

  template:
    metadata:
      labels:
        app: product-service

    spec:
      containers:
        - name: product-service
          image: harishgundimeda/shopflow-project-product-service:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8002

          env:
            - name: DB_HOST
              value: mysql

            - name: DB_PORT
              value: "3306"

            - name: DB_USER
              value: root

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopflow-secret
                  key: MYSQL_ROOT_PASSWORD

            - name: DB_NAME
              value: product_db

            - name: PORT
              value: "8002"

            - name: AUTH_SERVICE_URL
              value: http://auth-service:8001

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            tcpSocket:
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 20