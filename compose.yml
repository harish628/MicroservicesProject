version: "3.9"

networks:
  shopflow-network:
    driver: bridge

volumes:
  mysql-data:

services:

  mysql:
    image: mysql:8.0
    container_name: shopflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - shopflow-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  auth-service:
    image: harishgundimeda/shopflow-project-auth-service:latest
    container_name: shopflow-auth-service
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      DB_NAME: auth_db
      PORT: 8001
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: 24
    ports:
      - "8001:8001"
    networks:
      - shopflow-network
    depends_on:
      mysql:
        condition: service_healthy

  product-service:
    image: harishgundimeda/shopflow-project-product-service:latest
    container_name: shopflow-product-service
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      DB_NAME: product_db
      PORT: 8002
      AUTH_SERVICE_URL: http://auth-service:8001
    ports:
      - "8002:8002"
    networks:
      - shopflow-network
    depends_on:
      mysql:
        condition: service_healthy
      auth-service:
        condition: service_started

  order-service:
    image: harishgundimeda/shopflow-project-order-service:latest
    container_name: shopflow-order-service
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      DB_NAME: order_db
      PORT: 8003
      AUTH_SERVICE_URL: http://auth-service:8001
      PRODUCT_SERVICE_URL: http://product-service:8002
      NOTIFICATION_SERVICE_URL: http://notification-service:8005
    ports:
      - "8003:8003"
    networks:
      - shopflow-network
    depends_on:
      mysql:
        condition: service_healthy
      auth-service:
        condition: service_started
      product-service:
        condition: service_started

  payment-service:
    image: harishgundimeda/shopflow-project-payment-service:latest
    container_name: shopflow-payment-service
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      DB_NAME: payment_db
      PORT: 8004
      AUTH_SERVICE_URL: http://auth-service:8001
      ORDER_SERVICE_URL: http://order-service:8003
      PAYMENT_SUCCESS_RATE: 0.95
    ports:
      - "8004:8004"
    networks:
      - shopflow-network
    depends_on:
      mysql:
        condition: service_healthy
      auth-service:
        condition: service_started

  notification-service:
    image: harishgundimeda/shopflow-project-notification-service:latest
    container_name: shopflow-notification-service
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      DB_NAME: notification_db
      PORT: 8005
      AUTH_SERVICE_URL: http://auth-service:8001
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-ShopFlow <noreply@shopflow.com>}
    ports:
      - "8005:8005"
    networks:
      - shopflow-network
    depends_on:
      mysql:
        condition: service_healthy
      auth-service:
        condition: service_started

  api-gateway:
    image: harishgundimeda/shopflow-project-api-gateway:latest
    container_name: shopflow-api-gateway
    restart: unless-stopped
    environment:
      PORT: 8000
      AUTH_SERVICE_URL: http://auth-service:8001
      PRODUCT_SERVICE_URL: http://product-service:8002
      ORDER_SERVICE_URL: http://order-service:8003
      PAYMENT_SERVICE_URL: http://payment-service:8004
      NOTIFICATION_SERVICE_URL: http://notification-service:8005
      ALLOWED_ORIGINS: http://65.0.105.148:3000,http://65.0.105.148:4200
    ports:
      - "8000:8000"
    networks:
      - shopflow-network
    depends_on:
      - auth-service
      - product-service
      - order-service
      - payment-service
      - notification-service

  frontend:
    image: harishgundimeda/shopflow-project-frontend:latest
    container_name: shopflow-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - shopflow-network
    depends_on:
      - api-gateway

  admin-dashboard:
    image: harishgundimeda/shopflow-project-admin-dashboard:latest
    container_name: shopflow-admin-dashboard
    restart: unless-stopped
    ports:
      - "4200:80"
    networks:
      - shopflow-network
    depends_on:
      - api-gateway